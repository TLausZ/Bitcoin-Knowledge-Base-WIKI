// die tools/rank_articles.py nach Outputs/ranking.csv schreibt.

// Es sind immer die LABEL_TOP schwersten SICHTBAREN Artikel beschriftet —

// ============================================================================
// GLOBALE PARAMETER & ZUSTAND
// ============================================================================
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const N = 240,        // Auflösung des Höhenfelds: N×N Gitterpunkte
      ZMAX = 0.9,     // maximale Hügelhöhe in Weltkoordinaten
      SIG = 0.115,    // Breite (Sigma) des Hauptgipfels pro Artikel
      SKIRT = 0.17,   // Breite des flachen "Rocksaums" um jeden Gipfel
      DOM = 2.7,      // halbe Kantenlänge der Ebene: x/y laufen -DOM..+DOM
      ZOOM0 = 1.25;   // Zoom beim Laden und nach R-Reset

    pitch = 1.08,     // Kippwinkel der Kamera (1.55 ≈ fast Draufsicht)
    scale0 = 0.2,     // Grundmaßstab, wird mit zoom multipliziert
    zoom = ZOOM0,     // aktueller Zoomfaktor, geändert per Mausrad (0.4..8)
    panX = 0, panY = 0;  // Verschiebung der Karte in Gerätepixeln (W/A/S/D)
let segsByLevel = [], // vorberechnete Kontur-Segmente pro Höhenstufe (für den Schatten)
    loopsByLevel = [],// dieselben Konturen als geschlossene Ringe (für das Gelände)
    field = [],       // das fertige Höhenfeld (für den Sichtbarkeitstest der Labels)
    peaks = [],       // PEAKS angereichert um echte Höhe z und Anzeigename
    hover = -1,       // Index des Artikels unter der Maus (-1 = keiner)
    sel = -1;         // Index des in der Liste angeklickten Artikels
// Gitterindex 0..N-1 → Weltkoordinate -DOM..+DOM
const g2w = i => (i/(N-1)*2-1)*DOM;

// ============================================================================
// HÖHENFELD
// Baut aus den PEAKS-Daten ein N×N-Gitter mit Höhenwerten 0..1.
// Jeder Artikel wird zu einem Hügel: Höhe = Gewicht, Position = x/y.
// Dazu kommt leichtes Wellenrauschen, damit das "Tal" zwischen den Hügeln
// nicht steril flach aussieht, sondern wie echtes Gelände.
// ============================================================================
function buildField(){
  // --- Hintergrund-Wellen (dekoratives Rauschen) ---
  // 18 Sinuswellen mit zufälliger Richtung, Frequenz und Phase.
  const waves=[];
  let s=21;                                   // fester Seed → Karte bei jedem Laden identisch
  // Deterministischer Pseudozufallsgenerator (mulberry32) statt Math.random,
  // damit dieselben Wellen bei jedem Seitenaufruf entstehen.
  const rnd=()=>{s=(s+0x6D2B79F5)|0; let t=Math.imul(s^s>>>15,1|s);   // mulberry32
    t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296;};
  for(let k=0;k<18;k++){const a=rnd()*6.28, fr=3+rnd()*11;
    waves.push({dx:Math.cos(a)*fr, dy:Math.sin(a)*fr, ph:rnd()*6.28,
      amp:(.015+rnd()*.03)/(1+fr*0.06)});}     // hohe Frequenz → kleinere Amplitude

  // --- Höhenwert für jeden Gitterpunkt berechnen ---
  const f=[]; let mn=1e9,mx=-1e9;              // mn/mx für spätere Normierung
  for(let j=0;j<N;j++){f[j]=[];
    for(let i=0;i<N;i++){
      const x=g2w(i), y=g2w(j); let v=0;       // Weltkoordinate dieses Gitterpunkts
      // Beitrag aller Artikel-Hügel aufsummieren
      for(const p of PEAKS){const dx=x-p.x,dy=y-p.y, r2=dx*dx+dy*dy;
        if(r2>0.6) continue;                   // zu weit weg → kein Beitrag (Performance)
        const ps=Math.pow(p.s,1.35);           // Gewicht leicht gestaucht: kleine Hügel bleiben sichtbar
        v+=ps*(Math.exp(-Math.pow(r2/(2*SIG*SIG),1.7))   // Super-Gauss: flaches Plateau, sanfter Rand
             + 0.25*Math.exp(-r2/(2*SKIRT*SKIRT)));}     // breiter flacher Sockel um den Gipfel
      // Wellenrauschen addieren
      for(const w of waves) v+=w.amp*Math.sin(x*w.dx+y*w.dy+w.ph);
      // Zum Rand hin sanft auf 0 ausblenden, damit die Konturlinien
      // in einer runden "Insel" auslaufen statt hart am Gitterrand abzubrechen.
      const r=Math.hypot(x,y);                 // radialer Fade: Linien enden nicht am Grid-Rand
      const m=Math.min(1, Math.max(0, (2.62-r)/0.32));
      v*=m*m*(3-2*m);                          // smoothstep
      f[j][i]=v; if(v<mn)mn=v; if(v>mx)mx=v;
    }}
  // Auf 0..1 normieren, damit die Konturstufen unabhängig von den Rohwerten sind.
  for(let j=0;j<N;j++)for(let i=0;i<N;i++)f[j][i]=(f[j][i]-mn)/(mx-mn);

  // peaks-Array für die Anzeige aufbauen: jede Position bekommt ihre
  // tatsächliche Höhe aus dem fertigen Feld (dort setzen die Label-Linien an).
  peaks = PEAKS.map(p=>{
    const gi=Math.round((p.x/DOM+1)/2*(N-1)), gj=Math.round((p.y/DOM+1)/2*(N-1));  // Welt → Gitterindex
    return {x:p.x, y:p.y, z:f[gj][gi]*ZMAX, name:p.n.replace(/-/g,' ')};
  });
  return f;
}

// ============================================================================
// KONTURLINIEN (Marching Squares)
// Findet für eine Höhenstufe `level` alle Liniensegmente, an denen das
// Höhenfeld diese Stufe schneidet — wie Höhenlinien auf einer Wanderkarte.
// Prinzip: jede 2×2-Zelle des Gitters wird einzeln betrachtet. Liegt eine
// Ecke über und die Nachbarecke unter dem Level, schneidet die Höhenlinie
// die Kante dazwischen; der genaue Schnittpunkt wird linear interpoliert.
// ============================================================================
function contour(f, level){
  const segs=[], ip=(a,b)=>(level-a)/(b-a);   // ip: Anteil des Schnittpunkts auf der Kante (0..1)
  for(let j=0;j<N-1;j++)for(let i=0;i<N-1;i++){
    // Die vier Eckwerte der Zelle: a=oben-links, b=oben-rechts,
    // c=unten-rechts, d=unten-links.
    const a=f[j][i], b=f[j][i+1], c=f[j+1][i+1], d=f[j+1][i], cr={};
    // Für jede Kante prüfen, ob die Höhenlinie sie kreuzt (Vorzeichenwechsel).
    // T/R/B/L = Schnittpunkt auf der oberen/rechten/unteren/linken Kante.
    if((a>level)!==(b>level)) cr.T={x:i+ip(a,b), y:j};
    if((b>level)!==(c>level)) cr.R={x:i+1,        y:j+ip(b,c)};
    if((c>level)!==(d>level)) cr.B={x:i+1-ip(c,d),y:j+1};
    if((d>level)!==(a>level)) cr.L={x:i,          y:j+1-ip(d,a)};
    const k=Object.keys(cr);
    // Normalfall: genau 2 Kanten gekreuzt → ein Liniensegment durch die Zelle.
    if(k.length===2) segs.push([cr[k[0]],cr[k[1]]]);
    // Sattelfall: alle 4 Kanten gekreuzt → mehrdeutig. Der Mittelwert der
    // Ecken entscheidet, wie die zwei Segmente verbunden werden.
    else if(k.length===4){
      if((a+b+c+d)/4>level){segs.push([cr.T,cr.R]);segs.push([cr.B,cr.L]);}
      else {segs.push([cr.T,cr.L]);segs.push([cr.R,cr.B]);}
    }
  }
  return segs;
}

// ============================================================================
// SEGMENTE → GESCHLOSSENE RINGE
// Marching Squares liefert lose Einzelsegmente in beliebiger Reihenfolge.
// Damit jeder Konturring als Fläche gefüllt werden kann (deckende Karte),
// werden die Segmente hier an ihren Endpunkten zu geschlossenen
// Polygonzügen verkettet. Endpunkte werden grob quantisiert, damit
// Fließkomma-Reste beim Vergleich keine Rolle spielen.
// ============================================================================
function chainLoops(segs){
  const key=p=>Math.round(p.x*8192)+','+Math.round(p.y*8192);
  // Index: Endpunkt → alle Segmente, die dort anfangen oder enden
  const map=new Map();
  segs.forEach((s,i)=>{for(let e=0;e<2;e++){const k=key(s[e]);
    if(!map.has(k)) map.set(k,[]); map.get(k).push({i,e});}});
  const used=new Array(segs.length).fill(false), loops=[];
  for(let i0=0;i0<segs.length;i0++){
    if(used[i0]) continue;
    used[i0]=true;
    const pts=[segs[i0][0], segs[i0][1]];
    // vom losen Ende aus immer das anschließende Segment suchen,
    // bis der Ring geschlossen ist (oder kein Anschluss mehr existiert)
    while(true){
      const k=key(pts[pts.length-1]);
      const c=(map.get(k)||[]).find(c=>!used[c.i]);
      if(!c) break;
      used[c.i]=true;
      pts.push(segs[c.i][1-c.e]);              // das ANDERE Ende des Anschluss-Segments
      if(key(pts[pts.length-1])===key(pts[0])) break;   // Ring geschlossen
    }
    loops.push(pts);
  }
  // Große Ringe zuerst füllen, damit ein äußerer Ring nicht nachträglich
  // die Linie eines innen liegenden (z.B. Senke im Hügel) übermalt.
  const area=pts=>{let a=0;
    for(let k=0;k<pts.length;k++){const p=pts[k],q=pts[(k+1)%pts.length];
      a+=p.x*q.y-q.x*p.y;} return Math.abs(a);};
  return loops.sort((a,b)=>area(b)-area(a));
}

// Baut das Höhenfeld und berechnet daraus 31 Höhenstufen (Level 1/32..31/32),
// jeweils als lose Segmente (für den Schatten) und geschlossene Ringe
// (für das Gelände). Bei jedem draw() wird nur noch projiziert und
// gezeichnet — die teure Rechnung passiert also nur einmal.
function build(){
  const f = field = buildField();   // Feld auch global merken (Label-Sichtbarkeit)
  segsByLevel=[]; loopsByLevel=[]; const L=32;
  for(let l=1;l<L;l++){
    const segs=contour(f,l/L);
    segsByLevel.push({z:l/L*ZMAX, segs});
    loopsByLevel.push({z:l/L*ZMAX, loops:chainLoops(segs)});
  }
  draw();
}

// ============================================================================
// 3D → 2D PROJEKTION
// Einfache orthografische Projektion: erst um die Hochachse drehen (yaw),
// dann kippen (pitch). Keine Perspektive — ferne Punkte werden nicht kleiner,
// was für den Karten-Look genau richtig ist.
// x/y/z = Weltkoordinaten, cx/cy = Bildmittelpunkt in Pixeln, sc = Maßstab.
// ============================================================================
function project(x,y,z,cx,cy,sc){
  const cyw=Math.cos(yaw), syw=Math.sin(yaw), cp=Math.cos(pitch), sp=Math.sin(pitch);
  const X=x*cyw-y*syw, Y1=x*syw+y*cyw,   // Rotation in der Ebene
        zc=z-ZMAX/2,                     // Höhe um die Mitte zentrieren (dreht "um die Karte")
        Y=Y1*cp+zc*sp;                   // Kippen: Tiefe und Höhe mischen sich zur Bild-Y-Achse
  return [cx+X*sc, cy-Y*sc];             // Y negiert: Canvas-Y wächst nach unten
}

// Liefert die aktuellen Zeichenparameter: Bildmittelpunkt, Maßstab, Pixeldichte.
// Der Mittelpunkt ist nach rechts verschoben, damit die Karte neben dem
// linken Listen-Panel zentriert erscheint.
function view(){const W=cv.width,H=cv.height,dpr=window.devicePixelRatio||1;
  const pw=276*dpr;                                  // linkes Panel
  return {cx:pw+(W-pw)/2+panX, cy:H*0.56+panY, sc:Math.min(W-pw,H)*scale0*zoom, dpr};}

// ============================================================================
// LABEL-SICHTBARKEIT
// Prüft, ob ein Gipfel von der Kamera aus zu sehen ist oder hinter näher
// liegendem Gelände verschwindet. Dazu wird der Sehstrahl vom Gipfel in
// Richtung Betrachter Zelle für Zelle abgeschritten; der Strahl steigt
// dabei mit cos(pitch)/sin(pitch) an. Ragt das Gelände irgendwo über den
// Strahl, ist der Gipfel verdeckt und sein Label wird nicht gezeichnet.
// ============================================================================
function peakVisible(pk){
  const syw=Math.sin(yaw), cyw=Math.cos(yaw);
  const slope=Math.cos(pitch)/Math.sin(pitch);   // Anstieg des Sehstrahls pro Wegstrecke
  const step=2*DOM/(N-1);                        // Schrittweite: eine Gitterzelle
  let x=pk.x, y=pk.y, h=pk.z;
  while(true){
    x-=step*syw; y-=step*cyw; h+=step*slope;     // einen Schritt Richtung Kamera
    if(h>=ZMAX) return true;                     // Strahl über Maximalhöhe: nichts verdeckt mehr
    if(x<-DOM||x>DOM||y<-DOM||y>DOM) return true;// Rand erreicht, ohne zu kollidieren
    const gi=Math.round((x/DOM+1)/2*(N-1)), gj=Math.round((y/DOM+1)/2*(N-1));
    if(field[gj][gi]*ZMAX > h+0.02) return false;// Gelände ragt über den Strahl (0.02 Toleranz)
  }
}

// ============================================================================
// ZEICHNEN
// Wird bei jeder Interaktion (drehen, zoomen, hover, klick) neu aufgerufen.
// Reihenfolge: 1. Schatten am Boden, 2. Höhenlinien in 3D, 3. Labels/Marker.
// ============================================================================
function draw(){
  const {cx,cy,sc,dpr}=view(), W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H); ctx.lineCap='round'; ctx.lineJoin='round';

  // 1. "Schatten": alle Konturen flach auf eine Ebene UNTER dem Gelände
  // projiziert (z=-0.35 statt 0), sehr blass — so löst sich der Schatten
  // sichtbar von der Karte und verschwindet nicht hinter ihr.
  ctx.strokeStyle='rgba(110,92,64,0.07)'; ctx.lineWidth=1*dpr; ctx.beginPath();
  for(const lv of segsByLevel) for(const s of lv.segs){
    const p=project(g2w(s[0].x), g2w(s[0].y), -0.35, cx,cy,sc);
    const q=project(g2w(s[1].x), g2w(s[1].y), -0.35, cx,cy,sc);
    ctx.moveTo(p[0],p[1]); ctx.lineTo(q[0],q[1]);
  } ctx.stroke();

  // 1b. Kartenkörper: die Grundfläche der Insel wird deckend in der
  // Hintergrundfarbe gefüllt (projizierter Kreis → Ellipse). Das verdeckt
  // den Schatten überall dort, wo die Karte davor liegt — sichtbar bleibt
  // er nur am vorderen Rand.
  {
    const [ex,ey]=project(0,0,0,cx,cy,sc);   // Mittelpunkt der Bodenebene
    ctx.fillStyle='#ece2cd';                 // = Seitenhintergrund
    ctx.beginPath();
    // Kreis mit Radius 2.62 (Rand des radialen Fades); vertikal um cos(pitch)
    // gestaucht, weil die Bodenebene gekippt betrachtet wird.
    ctx.ellipse(ex,ey,2.62*sc,2.62*sc*Math.cos(pitch),0,0,7);
    ctx.fill();
  }

  // 2. Die eigentlichen Höhenlinien: die Karte als fester Körper.
  // Pro Konturring werden von unten nach oben zwei Flächen deckend gefüllt:
  //   a) die "Wand" — der Ring zusammen mit sich selbst eine Höhenstufe
  //      tiefer. Ohne sie klaffen bei flachem Blickwinkel senkrechte Lücken
  //      zwischen den Stufen und die Karte wirkt von der Seite durchsichtig.
  //   b) der "Deckel" — der Ring auf seiner Höhe, gefüllt und umrandet.
  // Die Füllungen übermalen alles, was dahinter/darunter liegt.
  // (Bei dieser Projektion gilt: pro Bildpunkt gewinnt die höchste Fläche,
  // deshalb ist die Reihenfolge niedrig → hoch korrekt.)
  ctx.strokeStyle='rgba(74,58,40,0.68)'; ctx.lineWidth=0.85*dpr;
  ctx.fillStyle='#ece2cd';
  // Bildschirm-Versatz einer Höhenstufe nach unten: nur die Höhe z ändert
  // sich, in der Projektion ist das ein rein vertikaler Shift um z·sin(pitch).
  const wall=(ZMAX/32)*Math.sin(pitch)*sc;
  for(const lv of loopsByLevel) for(const loop of lv.loops){
    // Ringpunkte einmal projizieren, für Wand und Deckel wiederverwenden
    const pts=loop.map(p=>project(g2w(p.x), g2w(p.y), lv.z, cx,cy,sc));
    // a) Wand: Ring vorwärts, dann derselbe Ring eine Stufe tiefer rückwärts
    ctx.beginPath();
    pts.forEach(([px,py],k)=>k?ctx.lineTo(px,py):ctx.moveTo(px,py));
    for(let k=pts.length-1;k>=0;k--) ctx.lineTo(pts[k][0], pts[k][1]+wall);
    ctx.closePath(); ctx.fill();
    // b) Deckel: der Ring selbst
    ctx.beginPath();
    pts.forEach(([px,py],k)=>k?ctx.lineTo(px,py):ctx.moveTo(px,py));
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // 3. Dauerhafte Labels: die gewichtigsten Artikel, die gerade SICHTBAR sind.
  // Beim Hineinzoomen fallen Gipfel aus dem Bild und die nächst-gewichtigen
  // sichtbaren rücken nach — herausgezoomt entspricht das genau den globalen
  // Top-Artikeln (peaks ist nach Gewicht sortiert).
  // Das Label-Budget wächst zusätzlich quadratisch mit dem Zoom: in der
  // Startansicht LABEL_TOP Stück, bei Maximal-Zoom (8) genug für alle
  // dann noch sichtbaren Artikel.
  // Jedes Label bekommt eine Linie vom Gipfel nach oben und eine Textbox.
  // Kollisionsvermeidung: Überlappt eine Box eine bereits platzierte,
  // wird sie zeilenweise nach oben geschoben, bis sie frei liegt.
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.font=`${11*dpr}px ui-sans-serif,system-ui,sans-serif`;
  const lh=14*dpr, pad=4*dpr, placed=[];     // lh=Zeilenhöhe, placed=schon belegte Boxen
  const pw=276*dpr, mg=20*dpr;               // pw=Panelbreite, mg=Toleranzrand
  // Budget: LABEL_TOP bei Start-Zoom, wächst quadratisch — die sichtbare
  // Fläche schrumpft ja auch quadratisch. Bei zoom=8 sind das ~860 Labels,
  // mehr als je gleichzeitig im Ausschnitt liegen → alle sichtbaren beschriftet.
  const budget=Math.round(LABEL_TOP*Math.pow(zoom/ZOOM0,2));
  const items=peaks.map((pk,i)=>({pk,i}))
    .map(o=>{const [x,y]=project(o.pk.x,o.pk.y,o.pk.z,cx,cy,sc); return {...o,x,y};})
    .filter(o=>o.x>pw-mg && o.x<W+mg && o.y>-mg && o.y<H+mg)   // nur Gipfel im Bild
    .filter(o=>peakVisible(o.pk))             // hinter Bergen verdeckte Gipfel überspringen
    .slice(0,budget)                          // die schwersten davon (Reihenfolge = Gewicht)
    .map(o=>({...o,w:ctx.measureText(o.pk.name).width+2*pad})).sort((a,b)=>a.y-b.y);
  const labeled=new Set(items.map(o=>o.i));   // für die Marker-Logik unten
  // Textbox horizontal in den sichtbaren Bereich zwingen
  const clampX=(x,w)=>Math.max(w/2+2*dpr, Math.min(W-w/2-2*dpr, x));
  labelBoxes.length=0;                      // Trefferflächen für den Hover neu aufbauen
  for(const it of items){
    const tx=clampX(it.x, it.w);            // label box stays on screen
    let ty=it.y-34*dpr;                     // Startposition: 34px über dem Gipfel
    // Nach oben schieben bis keine Kollision mehr (max. 50 Versuche als Bremse)
    for(let n=0;n<50;n++){let hit=false;
      for(const b of placed)
        if(Math.abs(tx-b.x)<(it.w+b.w)/2 && Math.abs(ty-b.ty)<lh){ty=b.ty-lh;hit=true;}
      if(!hit) break;}
    placed.push({x:tx, ty, w:it.w});
    // Die Textbox als Hover-Trefferfläche merken (Gerätepixel-Koordinaten)
    labelBoxes.push({i:it.i, x0:tx-it.w/2, y0:ty-lh, x1:tx+it.w/2, y1:ty});
    const hi = it.i===sel || it.i===hover;   // nur Farbe wechseln, Position bleibt
    // Verbindungslinie Gipfel → Label (mit Knick, falls die Box geclampt wurde)
    ctx.strokeStyle=hi?'rgba(120,70,40,0.85)':'rgba(74,58,40,0.4)'; ctx.lineWidth=(hi?1.2:1)*dpr;
    ctx.beginPath(); ctx.moveTo(it.x,it.y); ctx.lineTo(it.x,ty);
    ctx.lineTo(tx,ty); ctx.stroke();         // short elbow when clamped
    // Punkt auf dem Gipfel
    ctx.fillStyle=hi?'rgba(150,90,50,0.95)':'rgba(74,58,40,0.9)';
    ctx.beginPath(); ctx.arc(it.x,it.y,(hi?3:1.8)*dpr,0,7); ctx.fill();
    // Textbox: normal beige-transparent, hervorgehoben braun mit hellem Text
    ctx.fillStyle=hi?'rgba(92,74,52,0.97)':'rgba(236,226,205,0.82)';
    ctx.fillRect(tx-it.w/2, ty-lh, it.w, lh);
    ctx.fillStyle=hi?'#f2ead6':'rgba(74,58,40,0.9)';
    ctx.fillText(it.pk.name, tx, ty-2*dpr);
  }

  // Marker für Artikel OHNE dauerhaftes Label: wird nur bei Hover oder
  // Auswahl in der Liste gezeichnet (braune Box, beiger Text).
  function marker(i){                     // brown box, beige text
    const pk=peaks[i], [x,y]=project(pk.x,pk.y,pk.z,cx,cy,sc);
    ctx.font=`${12*dpr}px ui-sans-serif,system-ui,sans-serif`;
    const w=ctx.measureText(pk.name).width+8*dpr, ty=y-22*dpr;
    const tx=Math.max(w/2+2*dpr, Math.min(W-w/2-2*dpr, x));   // clamp on screen
    ctx.strokeStyle='rgba(120,70,40,0.85)'; ctx.lineWidth=1.2*dpr;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,ty); ctx.lineTo(tx,ty); ctx.stroke();
    ctx.fillStyle='rgba(150,90,50,0.95)';
    ctx.beginPath(); ctx.arc(x,y,3*dpr,0,7); ctx.fill();
    ctx.fillStyle='rgba(92,74,52,0.97)';
    ctx.fillRect(tx-w/2, ty-16*dpr, w, 16*dpr);
    ctx.fillStyle='#f2ead6'; ctx.textBaseline='bottom';
    ctx.fillText(pk.name, tx, ty-3*dpr);
  }
  if(sel>=0 && !labeled.has(sel)) marker(sel);          // beschriftete Gipfel wechseln nur die Farbe
  if(hover>=0 && hover!==sel && !labeled.has(hover)) marker(hover);
}

// ============================================================================
// HOVER-ERKENNUNG
// Reagiert nur auf die Label-Textboxen, nicht auf Gipfelpunkt oder
// Verbindungslinie. Die Trefferflächen (labelBoxes) füllt draw() bei jedem
// Zeichnen neu. mx/my sind CSS-Pixel, die Boxen liegen in Gerätepixeln,
// deshalb die Umrechnung mit dpr.
// ============================================================================
const labelBoxes=[];
function labelAt(mx,my){
  const dpr=window.devicePixelRatio||1, x=mx*dpr, y=my*dpr;
  for(const b of labelBoxes)
    if(x>=b.x0 && x<=b.x1 && y>=b.y0 && y<=b.y1) return b.i;
  return -1;
}

// ============================================================================
// MAUS-/TOUCH-STEUERUNG
// Ziehen dreht die Kamera (horizontal = yaw, vertikal = pitch),
// Mausrad zoomt, Bewegung ohne Taste aktualisiert den Hover-Zustand.
// ============================================================================
let drag=false, px=0, py=0, moved=false;    // px/py: letzte Zeigerposition; moved: wurde gezogen?
cv.addEventListener('pointerdown',e=>{drag=true;moved=false;px=e.clientX;py=e.clientY;
  cv.classList.add('drag');cv.setPointerCapture(e.pointerId);});   // Capture: Ziehen endet nicht am Canvas-Rand
cv.addEventListener('pointermove',e=>{
  if(drag){
    if(Math.abs(e.clientX-px)+Math.abs(e.clientY-py)>2) moved=true;  // echtes Ziehen, kein Klick mehr
    yaw+=(e.clientX-px)*0.008;              // horizontale Bewegung dreht die Karte
    // vertikale Bewegung kippt sie; begrenzt, damit man nicht "unter" die Karte gerät
    pitch=Math.max(0.12,Math.min(1.55,pitch+(e.clientY-py)*0.006));
    px=e.clientX; py=e.clientY; draw(); return;}
  // ohne gedrückte Taste: Hover-Ziel bestimmen, nur bei Wechsel neu zeichnen
  const h=labelAt(e.clientX,e.clientY);
  if(h!==hover){hover=h; draw(); cv.style.cursor=h>=0?'pointer':'grab';}
});
cv.addEventListener('pointerup',e=>{
  drag=false; cv.classList.remove('drag');
  if(moved) return;                          // nach dem Drehen keinen Klick auslösen
  // Klick auf ein Label: Artikel auswählen bzw. per Toggle wieder abwählen —
  // gleiche Wirkung wie ein Klick in der Liste (inkl. Markierung dort)
  const h=labelAt(e.clientX,e.clientY);
  if(h>=0){sel=(sel===h?-1:h); updateLink(); renderList(); draw();}
});
// Mausrad: Zoom multiplikativ in 10%-Schritten, begrenzt auf 0.4..4.
// preventDefault verhindert, dass die Seite selbst scrollt.
cv.addEventListener('wheel',e=>{e.preventDefault();
  zoom=Math.max(.4,Math.min(8,zoom*(e.deltaY<0?1.1:0.9)));draw();},{passive:false});

// ============================================================================
// TASTATUR
// W/A/S/D verschiebt den Kartenausschnitt, R setzt die Ansicht zurück.
// Für flüssiges Verschieben laufen gehaltene Tasten über eine
// requestAnimationFrame-Schleife: pro Frame ein kleiner Schritt statt der
// ruckeligen Auto-Wiederholung des Betriebssystems.
// ============================================================================
const held=new Set();                         // gerade gedrückte W/A/S/D-Tasten
let panRAF=0;                                 // ID der laufenden Animationsschleife (0 = keine)
function panStep(){
  const st=7*(window.devicePixelRatio||1);    // Schrittweite pro Frame (~420 px/s bei 60 fps)
  if(held.has('w')) panY+=st;                 // Blick nach oben → Karte rutscht nach unten
  if(held.has('s')) panY-=st;
  if(held.has('a')) panX+=st;                 // Blick nach links → Karte rutscht nach rechts
  if(held.has('d')) panX-=st;
  draw();
  panRAF=held.size?requestAnimationFrame(panStep):0;   // weiterlaufen solange etwas gedrückt ist
}
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='r'){yaw=0.6; pitch=1.08; zoom=ZOOM0; panX=0; panY=0; draw(); return;}   // = Startwerte oben
  if(!'wasd'.includes(k)) return;
  held.add(k);
  if(!panRAF) panRAF=requestAnimationFrame(panStep);   // Schleife nur einmal starten
});
addEventListener('keyup',e=>held.delete(e.key.toLowerCase()));
addEventListener('blur',()=>held.clear());    // Fensterwechsel: sonst bliebe eine Taste "hängen"

// ============================================================================
// ARTIKEL-LISTE (linkes Panel)
// Sortierbar nach Gewicht oder alphabetisch; erneuter Klick auf den aktiven
// Button dreht die Sortierrichtung um. Hover in der Liste hebt den Hügel
// hervor, Klick wählt ihn dauerhaft aus (nochmal klicken hebt die Auswahl auf).
// ============================================================================
const listEl=document.getElementById('list');
const swBtn=document.getElementById('sw'), saBtn=document.getElementById('sa');
const linkEl=document.getElementById('link');

// Zeigt Name + GitHub-URL des ausgewählten Artikels im Kartenbereich.
// Nur die URL selbst ist verlinkt (öffnet in neuem Fenster), der Name
// davor ist reiner Text. Ohne Auswahl bleibt die Stelle leer.
function updateLink(){
  linkEl.innerHTML='';
  if(sel<0) return;
  const n=PEAKS[sel].n, url=WIKI_URL+encodeURIComponent(n)+'.md';
  const b=document.createElement('b'); b.textContent=n.replace(/-/g,' ')+': ';
  const a=document.createElement('a');
  a.href=url; a.target='_blank'; a.rel='noopener'; a.textContent=url;
  linkEl.append(b,a);
}
let mode='w', dirW=-1, dirA=1;            // w: weight, a: alpha; -1 = desc

function renderList(){
  // Indizes statt der Objekte sortieren — i bleibt so der Index in PEAKS/peaks,
  // den auch hover/sel auf der Karte verwenden.
  const idx=PEAKS.map((_,i)=>i);
  if(mode==='w') idx.sort((a,b)=>dirW*(PEAKS[a].s-PEAKS[b].s) || PEAKS[a].n.localeCompare(PEAKS[b].n));  // bei gleichem Gewicht alphabetisch
  else idx.sort((a,b)=>dirA*PEAKS[a].n.localeCompare(PEAKS[b].n));
  // Button-Beschriftung und Aktiv-Zustand an aktuelle Sortierung anpassen
  swBtn.textContent='Gewicht '+(dirW<0?'↓':'↑');
  saBtn.textContent=dirA>0?'A–Z':'Z–A';
  swBtn.className=mode==='w'?'on':''; saBtn.className=mode==='a'?'on':'';
  // Liste komplett neu aufbauen (bei ~370 Einträgen völlig unkritisch)
  listEl.innerHTML='';
  for(const i of idx){
    const d=document.createElement('div');
    d.textContent=PEAKS[i].n.replace(/-/g,' ');
    // --w steuert per CSS die Breite des Gewichts-Balkens hinter dem Eintrag
    d.style.setProperty('--w', (PEAKS[i].s*100).toFixed(1)+'%');
    const sc=document.createElement('span'); sc.textContent=PEAKS[i].s.toFixed(2);  // Gewicht als Zahl
    d.appendChild(sc);
    if(i===sel){d.className='sel';
      // ausgewählten Eintrag möglichst mittig in der Liste zeigen
      // (relevant nach Klick auf ein Karten-Label). 'center' zentriert,
      // wo es geht; am Listenanfang/-ende bleibt der Scroll am Anschlag.
      requestAnimationFrame(()=>d.scrollIntoView({block:'center'}));}
    // Klick: Auswahl setzen bzw. per Toggle wieder aufheben,
    // danach die sel-Markierung in der Liste aktualisieren
    d.onclick=()=>{sel=(sel===i?-1:i); updateLink(); draw();
      for(const c of listEl.children) c.className='';
      if(sel>=0) d.className='sel';};
    // Hover in der Liste spiegelt sich als Hervorhebung auf der Karte
    d.onmouseenter=()=>{hover=i; draw();};
    d.onmouseleave=()=>{if(hover===i){hover=-1; draw();}};
    listEl.appendChild(d);
  }
}
// Klick auf aktiven Sortier-Button kehrt die Richtung um, sonst Modus wechseln
swBtn.onclick=()=>{if(mode==='w') dirW=-dirW; mode='w'; renderList();};
saBtn.onclick=()=>{if(mode==='a') dirA=-dirA; mode='a'; renderList();};

// ============================================================================
// START
// Canvas an Fenstergröße und Pixeldichte anpassen (dpr → scharf auf Retina),
// dann einmalig Feld + Konturen berechnen und die Liste füllen.
// ============================================================================
function resize(){const dpr=window.devicePixelRatio||1;
  cv.width=innerWidth*dpr; cv.height=innerHeight*dpr;         // interne Auflösung in Gerätepixeln
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px'; draw();}   // CSS-Größe in CSS-Pixeln
addEventListener('resize',resize);
document.getElementById('sub').textContent=   // Untertitel aus den Daten, veraltet nie
  `Alle ${PEAKS.length} Artikel · Höhe = Gewicht (PageRank + Quellen) · Top ${LABEL_TOP} beschriftet`;
resize(); build(); renderList();
</script>
