<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Zufalls-Höhenkarte · Basis für 3D-Bitcoin</title>
<style>
  html,body{margin:0;height:100%;background:#ece2cd;overflow:hidden;
    font:13px/1.4 ui-sans-serif,system-ui,sans-serif;color:#8a7a5e}
  #c{display:block;touch-action:none;cursor:grab}
  #c.drag{cursor:grabbing}
  #cap{position:fixed;left:0;top:0;right:0;z-index:2;user-select:none;
    background:#ece2cd;border-bottom:1px solid rgba(110,92,64,0.25);padding:10px 16px 9px}
  #cap h1{margin:0;font-size:15px;font-weight:600;color:#5c4a34;letter-spacing:.02em}
  #cap p{margin:3px 0 0;font-size:12px}
  b{color:#5c4a34}
  #hint{position:fixed;left:16px;bottom:14px;user-select:none;pointer-events:none}
  @media (max-width:640px){#hint{display:none}}
  /* Regler-Panel */
  #panel{position:fixed;top:108px;right:14px;z-index:3;width:230px;background:#f2ead6;
    border:1px solid rgba(110,92,64,0.4);border-radius:8px;padding:12px 14px;
    box-shadow:0 6px 20px rgba(60,48,32,.18)}
  #panel.hidden{display:none}
  #panel .row{margin:0 0 9px}
  #panel .lab{display:flex;justify-content:space-between;font-size:11.5px;color:#5c4a34;margin:0 0 2px}
  #panel .lab .v{color:#8a5a1e;font-variant-numeric:tabular-nums}
  #panel input[type=range]{width:100%;margin:0;accent-color:#8a5a1e;height:16px}
  #newmap,#logotog{width:100%;margin:2px 0 8px;padding:6px;font:inherit;font-size:12px;cursor:pointer;
    color:#f2ead6;background:#5c4a34;border:none;border-radius:5px}
  #newmap:hover,#logotog:hover{background:#6e5a40}
  #readout{font-size:10.5px;line-height:1.5;color:#6b5a42;border-top:1px solid rgba(110,92,64,.25);
    padding-top:7px;font-variant-numeric:tabular-nums;user-select:all}
  #ptog{position:fixed;top:70px;right:14px;z-index:4;padding:6px 10px;font:inherit;font-size:12px;
    cursor:pointer;color:#5c4a34;background:#f2ead6;border:1px solid rgba(110,92,64,0.4);border-radius:6px}
</style>
<div id="cap">
  <h1>Bitcoin ₿ · Höhenrelief</h1>
  <p>scharfe Kanten · leichter Höhenzug oben (FFT-Terrain), an der ₿-Silhouette abgeschnitten</p>
</div>
<canvas id="c"></canvas>
<button id="ptog">Regler ausblenden</button>
<div id="panel">
  <div id="prows"></div>
  <button id="logotog">Kante: scharf (Logo wechseln)</button>
  <div id="readout"></div>
</div>
<div id="hint">ziehen zum drehen · <b>scroll</b> zoom · <b>W A S D</b> verschieben · <b>N</b> neue Karte · <b>R</b> reset</div>

<script>
// Zufällige Höhenkarte im Look von index.html: gleiche Werte (N, ZMAX, SIG,
// SKIRT, DOM), 32 Höhenstufen, Wellenrauschen, radialer Insel-Fade. Statt der
// echten PEACES-Daten werden zufällige Hügel gestreut. Rendering identisch zu
// index.html (Schatten + Inselkörper + Wand/Deckel pro Konturring).
const cv=document.getElementById('c'), ctx=cv.getContext('2d');

// ---- Werte aus index.html ----
const N=256,          // Auflösung (Zweierpotenz für die FFT)
      DOM=2.7,        // halbe Kantenlänge der Ebene
      ZOOM0=1.25;
let ZMAX=1.05,        // maximale Höhe (Regler)
    L=32,             // Anzahl Höhenlinien/Stufen (Regler)
    BETA=4.30,        // Spektral-Exponent P(f)~1/f^BETA: höher = glatter (Regler)
    AUTOSPD=0.002,    // Auto-Dreh-Tempo (Regler)
    BASE=0.62,        // Sockelhöhe des ₿-Blocks (senkrechte Klippe) (Regler)
    TERW=0.30,        // Höhenzug oben drauf (FFT-Terrain), an den Kanten abgeschnitten (Regler)
    LOGO_S=1.0,       // Logo-Skala: ₿-Grösse (Regler)
    BASECUT=0.60,     // Boden-Schnitt: untere Ebenen als soliden Sockel rendern (Regler)
    LIFT=0.0;         // Schwebehöhe: hebt/senkt die (immer gegroundete) Basis; 0=auf dem Boden, -1=auf der Schattenebene, 1=höher (Regler)
let yaw=0.6, pitch=1.08, scale0=0.2, zoom=ZOOM0, auto=true, drag=false, px=0, py=0, panX=0, panY=0;
const held=new Set();   // gehaltene W/A/S/D-Tasten (Verschieben, wie index.html)
let seed=22, FIELD=null, LGDATA=null, segsByLevel=[], loopsByLevel=[], needField=false, needLevels=false;
const g2w=i=>(i/(N-1)*2-1)*DOM;
const mulberry32=a=>()=>{a=(a+0x6D2B79F5)|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};

// ---- FFT (iterativ, radix-2) ----
function fft1d(re,im,n,inv){
  for(let i=1,j=0;i<n;i++){let bit=n>>1;
    for(;j&bit;bit>>=1) j^=bit; j^=bit;
    if(i<j){let t=re[i];re[i]=re[j];re[j]=t; t=im[i];im[i]=im[j];im[j]=t;}}
  for(let len=2;len<=n;len<<=1){
    const ang=(inv?2:-2)*Math.PI/len, wr=Math.cos(ang), wi=Math.sin(ang);
    for(let i=0;i<n;i+=len){let cr=1,ci=0;
      for(let k=0;k<len>>1;k++){
        const a=i+k, b=a+(len>>1);
        const vr=re[b]*cr-im[b]*ci, vi=re[b]*ci+im[b]*cr;
        re[b]=re[a]-vr; im[b]=im[a]-vi; re[a]+=vr; im[a]+=vi;
        const nr=cr*wr-ci*wi; ci=cr*wi+ci*wr; cr=nr;}}}
  if(inv) for(let i=0;i<n;i++){re[i]/=n; im[i]/=n;}
}
function fft2d(re,im,M,inv){
  const rr=new Float64Array(M), ri=new Float64Array(M);
  for(let r=0;r<M;r++){const o=r*M;
    for(let c=0;c<M;c++){rr[c]=re[o+c];ri[c]=im[o+c];}
    fft1d(rr,ri,M,inv);
    for(let c=0;c<M;c++){re[o+c]=rr[c];im[o+c]=ri[c];}}
  for(let c=0;c<M;c++){
    for(let r=0;r<M;r++){rr[r]=re[r*M+c];ri[r]=im[r*M+c];}
    fft1d(rr,ri,M,inv);
    for(let r=0;r<M;r++){re[r*M+c]=rr[r];im[r*M+c]=ri[r];}}
}

// ---- Höhenfeld per Frequenzsynthese (Bourke) ----
// Weisses Rauschen → FFT → Spektrum mit 1/f^(BETA/2) filtern → inverse FFT.
// Realteil = fraktales Terrain. Danach radialer Insel-Fade wie index.html.
function computeField(){
  const M=N, rnd=mulberry32((seed*2654435761)^0x9e3779b9);
  const re=new Float64Array(M*M), im=new Float64Array(M*M);
  for(let i=0;i<M*M;i++) re[i]=rnd()*2-1;               // weisses Rauschen (reell)
  fft2d(re,im,M,false);                                  // → Frequenzraum
  for(let v=0;v<M;v++)for(let u=0;u<M;u++){               // Spektrum skalieren
    const fu=u<=M/2?u:u-M, fv=v<=M/2?v:v-M;
    const f=Math.hypot(fu,fv), s=f===0?0:Math.pow(f,-BETA/2), idx=v*M+u;
    re[idx]*=s; im[idx]*=s;}
  fft2d(re,im,M,true);                                   // → Ortsraum, Realteil = Höhe

  let rmn=1e9,rmx=-1e9;                                   // Terrain auf 0..1 normieren
  for(let i=0;i<M*M;i++){const v=re[i]; if(v<rmn)rmn=v; if(v>rmx)rmx=v;}
  const f=[]; let mx=0;
  for(let j=0;j<N;j++){f[j]=[];
    for(let i=0;i<N;i++){
      const nz=(re[j*M+i]-rmn)/(rmx-rmn);                 // FFT-Terrain 0..1
      // Nur das weisse ₿ ist Objekt (scharfe Kante). Innen: Sockel + Höhenzug,
      // aussen 0 → senkrechte Klippe. Terrain wird so an der ₿-Silhouette abgeschnitten.
      let lg=0;
      if(LGDATA){
        const uu=0.5+((i/(N-1))-0.5)/LOGO_S, vv=0.5+((j/(N-1))-0.5)/LOGO_S;
        if(uu>=0&&uu<1&&vv>=0&&vv<1) lg=LGDATA[(vv*(N-1))|0][(uu*(N-1))|0];
      }
      // Anheben entlang der Logo-Luminanz: scharfe Kante → 1px-Klippe,
      // geblurrte Kante → sanfte Terrassen. Aussen (lg klein) = 0.
      const climb=Math.max(0,Math.min(1,(lg-0.35)/0.30)), s=climb*climb*(3-2*climb);
      const val = s>0 ? (BASE+TERW*nz)*s : 0;
      f[j][i]=val; if(val>mx)mx=val;
    }}
  for(let j=0;j<N;j++)for(let i=0;i<N;i++)f[j][i]/=mx;
  return f;
}

// ---- Marching Squares + Ringe (aus index.html) ----
function contour(f, level){
  const segs=[], ip=(a,b)=>(level-a)/(b-a);
  for(let j=0;j<N-1;j++)for(let i=0;i<N-1;i++){
    const a=f[j][i],b=f[j][i+1],c=f[j+1][i+1],d=f[j+1][i],cr={};
    if((a>level)!==(b>level)) cr.T={x:i+ip(a,b),y:j};
    if((b>level)!==(c>level)) cr.R={x:i+1,y:j+ip(b,c)};
    if((c>level)!==(d>level)) cr.B={x:i+1-ip(c,d),y:j+1};
    if((d>level)!==(a>level)) cr.L={x:i,y:j+1-ip(d,a)};
    const k=Object.keys(cr);
    if(k.length===2) segs.push([cr[k[0]],cr[k[1]]]);
    else if(k.length===4){
      if((a+b+c+d)/4>level){segs.push([cr.T,cr.R]);segs.push([cr.B,cr.L]);}
      else {segs.push([cr.T,cr.L]);segs.push([cr.R,cr.B]);}
    }
  }
  return segs;
}
function chainLoops(segs){
  const key=p=>Math.round(p.x*8192)+','+Math.round(p.y*8192);
  const map=new Map();
  segs.forEach((s,i)=>{for(let e=0;e<2;e++){const k=key(s[e]);
    if(!map.has(k))map.set(k,[]);map.get(k).push({i,e});}});
  const used=new Array(segs.length).fill(false),loops=[];
  for(let i0=0;i0<segs.length;i0++){
    if(used[i0])continue; used[i0]=true;
    const pts=[segs[i0][0],segs[i0][1]];
    while(true){const k=key(pts[pts.length-1]);
      const c=(map.get(k)||[]).find(c=>!used[c.i]);
      if(!c)break; used[c.i]=true; pts.push(segs[c.i][1-c.e]);
      if(key(pts[pts.length-1])===key(pts[0]))break;}
    loops.push(pts);
  }
  const area=pts=>{let a=0;for(let k=0;k<pts.length;k++){const p=pts[k],q=pts[(k+1)%pts.length];
    a+=p.x*q.y-q.x*p.y;}return Math.abs(a);};
  return loops.sort((a,b)=>area(b)-area(a));
}
// Höhenlinien aus dem gecachten FIELD ziehen (ohne FFT — schnell, für L/ZMAX-Regler)
function rebuildLevels(){
  segsByLevel=[]; loopsByLevel=[];
  for(let l=1;l<L;l++){
    const segs=contour(FIELD,l/L);
    segsByLevel.push({z:l/L*ZMAX, segs});
    loopsByLevel.push({z:l/L*ZMAX, loops:chainLoops(segs)});
  }
}
function build(){ FIELD=computeField(); rebuildLevels(); }   // FFT + Höhenlinien

// ---- Projektion (aus index.html): Karte liegt flach, yaw dreht als Turntable ----
function project(x,y,z,cx,cy,sc){
  const cyw=Math.cos(yaw),syw=Math.sin(yaw),cp=Math.cos(pitch),sp=Math.sin(pitch);
  const X=x*cyw-y*syw, Y1=x*syw+y*cyw, zc=z-ZMAX/2, Y=Y1*cp+zc*sp;
  return [cx+X*sc, cy-Y*sc];
}

let W,H,dpr;
function resize(){
  dpr=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
}
addEventListener('resize',resize); resize();

function draw(){
  const cx=cv.width/2+panX, cy=cv.height*0.56+panY, sc=Math.min(cv.width,cv.height)*scale0*zoom;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.lineCap='round'; ctx.lineJoin='round';

  // 1. Schatten: alle Konturen flach auf eine Ebene unter dem Gelände, sehr blass
  ctx.strokeStyle='rgba(110,92,64,0.07)'; ctx.lineWidth=1*dpr; ctx.beginPath();
  for(const lv of segsByLevel) for(const s of lv.segs){
    const p=project(g2w(s[0].x),g2w(s[0].y),-0.35,cx,cy,sc);
    const q=project(g2w(s[1].x),g2w(s[1].y),-0.35,cx,cy,sc);
    ctx.moveTo(p[0],p[1]); ctx.lineTo(q[0],q[1]);
  } ctx.stroke();

  // 2. Höhenlinien als fester Körper: pro Ring Wand + Deckel, von unten nach oben
  ctx.strokeStyle='rgba(74,58,40,0.68)'; ctx.lineWidth=0.85*dpr; ctx.fillStyle='#ece2cd';
  const wall=(ZMAX/L)*Math.sin(pitch)*sc, sp=Math.sin(pitch);
  // Schummel-Trick: untere Ebenen (< cutZ) werden nicht einzeln gezeichnet.
  // Die erste sichtbare Ebene bildet mit einer Wand bis zum Boden den soliden
  // Sockel — oben bleiben die vielen feinen Höhenlinien.
  const cutZ=BASECUT*ZMAX, zoff=-cutZ+LIFT*0.35; let baseDrawn=false;  // zoff: -cutZ hebt die Schnitthöhe auf → Basis bleibt gegroundet (unabhängig vom Bodenschnitt); LIFT*0.35 = reiner Vertikal-Offset: 0=Boden, -1=Schattenebene, 1=höher
  for(const lv of loopsByLevel){
    if(lv.z<cutZ) continue;
    const solidBase=!baseDrawn; baseDrawn=true;
    const drop=solidBase ? lv.z*sp*sc : wall;     // Sockel bis Boden, sonst eine Stufe
    const rings=lv.loops.map(loop=>loop.map(p=>project(g2w(p.x),g2w(p.y),lv.z+zoff,cx,cy,sc)));
    if(!solidBase) for(const pts of rings){        // a) Wände — beim Sockel weggelassen:
      ctx.beginPath();                             //    cremefarbene Füllung (=Hintergrund) würde nur den Schatten verdecken
      pts.forEach(([qx,qy],k)=>k?ctx.lineTo(qx,qy):ctx.moveTo(qx,qy));
      for(let k=pts.length-1;k>=0;k--) ctx.lineTo(pts[k][0], pts[k][1]+drop);
      ctx.closePath(); ctx.fill();
    }
    ctx.beginPath();                               // b) Deckel — alle Ringe in einen Pfad,
    for(const pts of rings){                       //    evenodd stanzt die ₿-Löcher aus der Silhouette aus
      pts.forEach(([qx,qy],k)=>k?ctx.lineTo(qx,qy):ctx.moveTo(qx,qy));
      ctx.closePath();
    }
    ctx.fill('evenodd'); ctx.stroke();
  }
}

let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/16.67,3); last=now;
  // Regler-Änderungen gebündelt einmal pro Frame verarbeiten (FFT nur wenn nötig)
  if(needField){ build(); needField=needLevels=false; }
  else if(needLevels){ rebuildLevels(); needLevels=false; }
  if(auto) yaw+=AUTOSPD*dt;
  if(held.size){ const st=7*dpr*dt;                 // W/A/S/D: Karte verschieben (wie index.html)
    if(held.has('w')) panY+=st; if(held.has('s')) panY-=st;
    if(held.has('a')) panX+=st; if(held.has('d')) panX-=st; }
  draw();
  requestAnimationFrame(loop);
}
// Logo laden → Luminanz in LGDATA. Nur Weiss INNERHALB der schwarzen Scheibe
// (Kreismaske ~0.40·N) isoliert das ₿ vom hellen Hintergrund; vertikal gespiegelt.
let EDGE=0;                                                     // 0=scharf, 1=weich, 2=Kreis
const LOGOFILES=['bitcoin-logo-bw_small.png','bitcoin-logo-bw_blurred_small.png'];
const EDGENAMES=['scharf','weich','Kreis'];
function loadLogo(cb){
  const cc=N/2, R2=(0.40*N)*(0.40*N);
  if(EDGE===2){                                                 // Kreis: volle Scheibe statt ₿ — zeigt das ganze Seed-Terrain
    LGDATA=[];
    for(let j=0;j<N;j++){LGDATA[j]=[];
      for(let i=0;i<N;i++){const dx=i-cc, dy=j-cc; LGDATA[j][i]=(dx*dx+dy*dy<R2)?1:0;}}
    if(cb) cb(); return;
  }
  const img=new Image();
  img.onload=()=>{
    const o=document.createElement('canvas'); o.width=o.height=N;
    const g=o.getContext('2d'); g.drawImage(img,0,0,N,N);
    const d=g.getImageData(0,0,N,N).data; LGDATA=[];
    for(let j=0;j<N;j++){LGDATA[j]=[];
      for(let i=0;i<N;i++){const p=((N-1-j)*N+i)*4, dx=i-cc, dy=j-cc;
        LGDATA[j][i]= (dx*dx+dy*dy<R2) ? (d[p]+d[p+1]+d[p+2])/765 : 0;}}
    if(cb) cb();
  };
  img.src=LOGOFILES[EDGE];
}
loadLogo(()=>{ build(); syncUI(); });
requestAnimationFrame(loop);

// ---- Steuerung ----
cv.addEventListener('pointerdown',e=>{drag=true;auto=false;px=e.clientX;py=e.clientY;
  cv.classList.add('drag');cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{if(!drag)return;
  yaw+=(e.clientX-px)*0.01; pitch+=(e.clientY-py)*0.01;
  pitch=Math.max(0.35,Math.min(1.45,pitch)); px=e.clientX;py=e.clientY;});
cv.addEventListener('pointerup',()=>{drag=false;cv.classList.remove('drag');});
cv.addEventListener('wheel',e=>{e.preventDefault();
  zoom=Math.max(0.5,Math.min(6,zoom*(e.deltaY<0?1.1:0.9)));},{passive:false});
addEventListener('keydown',e=>{
  if(/^(input|textarea|select)$/i.test(e.target.tagName)) return;
  const k=e.key.toLowerCase();
  if(k==='n'){seed=seed>=255?1:seed+1; needField=true; syncUI(); return;}
  if(k==='r'){yaw=0.6;pitch=1.08;zoom=ZOOM0;auto=true;panX=panY=0; syncUI(); return;}
  if('wasd'.includes(k)) held.add(k);
});
addEventListener('keyup',e=>held.delete(e.key.toLowerCase()));
addEventListener('blur',()=>held.clear());   // Fensterwechsel: sonst bleibt eine Taste hängen

// ---- Regler-Panel ----
// rebuild: 'field' = FFT neu (β, Radius, Rand-Weichheit), 'levels' = nur
// Höhenlinien neu (schnell), 'none' = nur Ansicht.
const controls=[
  {id:'seed', lab:'Seed (Karte)',   min:1,   max:255,  step:1,    dec:0, get:()=>seed,   set:v=>seed=v,   rb:'field'},
  {id:'beta', lab:'β Rauheit',      min:1.5, max:4.5,  step:0.05, dec:2, get:()=>BETA,   set:v=>BETA=v,   rb:'field'},
  {id:'lev',  lab:'Höhenlinien',    min:25,  max:48,   step:1,    dec:0, get:()=>L,      set:v=>L=v,      rb:'levels'},
  {id:'cut',  lab:'Boden-Schnitt',  min:0,   max:0.85, step:0.02, dec:2, get:()=>BASECUT,set:v=>BASECUT=v,rb:'none'},
  {id:'zmax', lab:'Max-Höhe',       min:0.3, max:1.4,  step:0.05, dec:2, get:()=>ZMAX,   set:v=>ZMAX=v,   rb:'levels'},
  {id:'base', lab:'Sockel (Klippe)', min:0.01,max:1,    step:0.02, dec:2, get:()=>BASE,   set:v=>BASE=v,   rb:'field'},
  {id:'terw', lab:'Höhenzug oben',   min:0,   max:0.6,  step:0.02, dec:2, get:()=>TERW,   set:v=>TERW=v,   rb:'field'},
  {id:'logs', lab:'Logo-Skala',      min:0.6, max:1.8,  step:0.05, dec:2, get:()=>LOGO_S, set:v=>LOGO_S=v, rb:'field'},
  {id:'lift', lab:'Schwebehöhe',     min:-1,  max:1,    step:0.02, dec:2, get:()=>LIFT,   set:v=>LIFT=v,   rb:'none'},
];
const prows=document.getElementById('prows');
controls.forEach(c=>{
  const row=document.createElement('div'); row.className='row';
  row.innerHTML=`<div class="lab"><span>${c.lab}</span><span class="v" id="v_${c.id}"></span></div>`+
    `<input type="range" id="s_${c.id}" min="${c.min}" max="${c.max}" step="${c.step}">`;
  prows.appendChild(row);
  row.querySelector('input').addEventListener('input',e=>{
    c.set(parseFloat(e.target.value));
    if(c.rb==='field') needField=true; else if(c.rb==='levels') needLevels=true;
    syncUI();
  });
});
function syncUI(){
  for(const c of controls){
    const s=document.getElementById('s_'+c.id);
    if(document.activeElement!==s) s.value=c.get();
    document.getElementById('v_'+c.id).textContent=(+c.get()).toFixed(c.dec);
  }
  document.getElementById('readout').textContent=
    `β ${BETA.toFixed(2)} · Linien ${L} · Bodenschnitt ${BASECUT.toFixed(2)} · Höhe ${ZMAX.toFixed(2)} · Sockel ${BASE.toFixed(2)} · `+
    `Höhenzug ${TERW.toFixed(2)} · LogoSkala ${LOGO_S.toFixed(2)} · Schwebe ${LIFT.toFixed(2)} · `+
    `Kante ${EDGENAMES[EDGE]} · `+
    `Kippen ${pitch.toFixed(2)} · Seed ${seed}`;
}
const logotog=document.getElementById('logotog');
logotog.addEventListener('click',()=>{
  EDGE=(EDGE+1)%3;
  logotog.textContent='Kante: '+EDGENAMES[EDGE]+' (Logo wechseln)';
  loadLogo(()=>{ build(); syncUI(); });
});
const panel=document.getElementById('panel'), ptog=document.getElementById('ptog');
ptog.addEventListener('click',()=>{const h=panel.classList.toggle('hidden');
  ptog.textContent=h?'Regler':'Regler ausblenden';});
// Ansichtsänderungen per Maus in die Werte-Zeile spiegeln
cv.addEventListener('pointermove',()=>{if(drag)syncUI();});
cv.addEventListener('wheel',()=>syncUI(),{passive:true});
syncUI();
</script>
